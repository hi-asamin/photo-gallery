      </div>
      <div class="about__text">
        <h2 class="section__title" data-reveal>Asami</h2>
        <div data-reveal>
          <p>
            〇〇〇〇年生まれ フォトグラファー<br/>
            独学で写真を学び、<br/>
            〇〇〇〇年より風景と光を主題に撮影をはじめる<br/>
            以来、日本各地および海外で<br/>
            自然光のなかの「待つこと」を撮影、発表<br/>
            湿度のある光と、ささやかな日常の手触りを大切にした作風が評価され<br/>
            〇〇〇〇年 〇〇〇〇〇〇〇〇〇〇 へ選出<br/>
            また、〇〇〇〇〇〇〇〇 を受賞
          </p>
